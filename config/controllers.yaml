controller_manager:
  ros__parameters:
    update_rate: 100          # controller_manager loop rate (Hz), independent
                              # of how fast you publish commands
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Streaming position controller: drives all 6 joints toward the latest
    # Float64MultiArray on /forward_position_controller/commands.
    # No time_from_start, no fixed publish rate — publish at any Hz and it
    # always tracks the most recent command.
    forward_position_controller:
      type: position_controllers/JointGroupPositionController

forward_position_controller:
  ros__parameters:
    joints:
      - shoulder_pan
      - shoulder_lift
      - elbow_flex
      - wrist_flex
      - wrist_roll
      - gripper